<!DOCTYPE html>
<html>
<body>

<h2>🎤 Real-Time AI Voice Assistant</h2>

<button onclick="start()">Start Talking</button>

<script>

const socket = new WebSocket("ws://localhost:8003/voice-chat");

let silenceTimer = null;

async function start() {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const audioContext = new AudioContext({ sampleRate: 16000 });

    const source = audioContext.createMediaStreamSource(stream);

    const processor = audioContext.createScriptProcessor(4096, 1, 1);

    source.connect(processor);
    processor.connect(audioContext.destination);

    processor.onaudioprocess = (event) => {

        const input = event.inputBuffer.getChannelData(0);

        let sum = 0;

        for (let i = 0; i < input.length; i++) {
            sum += input[i] * input[i];
        }

        const volume = Math.sqrt(sum / input.length);

        // send audio
        const buffer = new Int16Array(input.length);

        for (let i = 0; i < input.length; i++) {
            buffer[i] = input[i] * 32767;
        }

        socket.send(buffer.buffer);

        // detect silence
        if (volume < 0.01) {

            if (!silenceTimer) {
                silenceTimer = setTimeout(() => {

                    console.log("User stopped speaking");

                    socket.send("END_OF_SPEECH");

                }, 1000);
            }

        } else {
            clearTimeout(silenceTimer);
            silenceTimer = null;
        }
    };
}

</script>

</body>
</html>
